<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin{% endblock %} · Support</title>
  <style>
    :root {
      --bg: #f4f5f7; --panel: #ffffff; --ink: #1c2330; --muted: #6b7280;
      --line: #e5e7eb; --brand: #2563eb; --brand-ink: #ffffff;
      --open: #b45309; --open-bg: #fef3c7; --closed: #047857; --closed-bg: #d1fae5;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 15px/1.5 system-ui, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--ink); }
    a { color: var(--brand); text-decoration: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--panel); border-right: 1px solid var(--line);
               padding: 20px 14px; position: sticky; top: 0; height: 100vh; }
    .brand { font-weight: 700; font-size: 16px; padding: 4px 10px 18px; }
    .sidebar nav a { display: block; padding: 9px 12px; border-radius: 8px;
                     color: var(--ink); margin-bottom: 4px; }
    .sidebar nav a:hover { background: var(--bg); }
    .sidebar nav a.active { background: var(--brand); color: var(--brand-ink); }
    .content { flex: 1; padding: 28px 34px; max-width: 1000px; }
    h1 { font-size: 22px; margin: 0 0 20px; }
    h2 { font-size: 16px; margin: 28px 0 12px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
            padding: 18px 20px; }
    .card .num { font-size: 30px; font-weight: 700; }
    .card .label { color: var(--muted); font-size: 13px; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel);
            border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--line);
             font-size: 14px; vertical-align: middle; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase;
         letter-spacing: .03em; background: #fafbfc; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px;
             font-size: 12px; font-weight: 600; }
    .badge.open { color: var(--open); background: var(--open-bg); }
    .badge.closed { color: var(--closed); background: var(--closed-bg); }
    .filters { margin-bottom: 14px; }
    .filters a { margin-right: 12px; color: var(--muted); }
    .filters a.on { color: var(--brand); font-weight: 600; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
             padding: 20px 24px; margin-bottom: 18px; }
    .row { margin-bottom: 14px; }
    .row .k { color: var(--muted); font-size: 12px; text-transform: uppercase;
              letter-spacing: .03em; margin-bottom: 3px; }
    textarea { width: 100%; min-height: 90px; padding: 10px; border: 1px solid var(--line);
               border-radius: 8px; font: inherit; resize: vertical; }
    .btn { display: inline-block; padding: 9px 16px; border: 1px solid var(--line);
           border-radius: 8px; background: var(--panel); color: var(--ink);
           font: inherit; cursor: pointer; }
    .btn.primary { background: var(--brand); color: var(--brand-ink); border-color: var(--brand); }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    .muted { color: var(--muted); }
    .back { display: inline-block; margin-bottom: 14px; }
    input[type=text] { width: 100%; padding: 9px 10px; border: 1px solid var(--line);
                       border-radius: 8px; font: inherit; }
    label { display: block; margin-bottom: 3px; color: var(--muted); font-size: 12px;
            text-transform: uppercase; letter-spacing: .03em; }
    .field { margin-bottom: 14px; }
    .btn.danger { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }
    .topbar { display: flex; justify-content: space-between; align-items: center;
              margin-bottom: 20px; }
    .topbar h1 { margin: 0; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">🎧 Support Admin</div>
      <nav>
        <a href="/admin" class="{{ 'active' if active == 'dashboard' else '' }}">Dashboard</a>
        <a href="/admin/tickets" class="{{ 'active' if active == 'tickets' else '' }}">Tickets</a>
        <a href="/admin/kb" class="{{ 'active' if active == 'kb' else '' }}">Knowledge Base</a>
      </nav>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
