# Labeled evaluation set for retrieval + routing.
# expected_id is the gold KB entry for ANSWER cases; null for CLARIFY/DECLINE
# (those are not about retrieving one specific entry).
# Used by eval/run_eval.py to compute recall@1/@3, MRR, and the routing confusion matrix.

